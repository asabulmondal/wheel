<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light dark">
  <title>Snack Duel</title>
  <style>
    /* CSS Variables - Light Theme */
    :root {
      --bg-center: #d2e4f6;
      --bg-edge: #4a658a;
      
      --text-color: #1e293b;
      --control-bg: rgba(255, 255, 255, 0.6);
      --control-text: #1e293b;
      
      --p1-color: #3b82f6; 
      --p2-color: #ec4899; 
      --active-p-color: #3b82f6; 
      
      /* Realistic 3D Wheel Variablesctx */
      --bezel-light: #ffffff;
      --bezel-dark: #94a3b8;
      --bezel-shadow: rgba(0, 0, 0, 0.3);
      
      --btn-grad-top: #ffffff;
      --btn-grad-bot: #cbd5e1;
      --btn-shadow: rgba(0, 0, 0, 0.4);
      
      --overlay-bg: rgba(210, 228, 246, 0.95);
      --overlay-text: #1e293b;
    }

    /* High Contrast Dark Theme */
    [data-theme="dark"] {
      --bg-center: #1e1b4b; 
      --bg-edge: #020617;   
      
      --text-color: #ffffff;
      --control-bg: rgba(255, 255, 255, 0.1);
      --control-text: #cbd5e1;
      
      --bezel-light: #475569;
      --bezel-dark: #0f172a;
      --bezel-shadow: rgba(0, 0, 0, 0.8);
      
      --btn-grad-top: #334155;
      --btn-grad-bot: #020617;
      --btn-shadow: rgba(0, 0, 0, 0.8);
      
      --overlay-bg: rgba(10, 10, 12, 0.95);
      --overlay-text: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-edge) 100%);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5vh;
      transition: background 0.4s ease;
      touch-action: manipulation;
    }

    /* Top Controls */
    .top-controls {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      width: 95%;
      z-index: 100;
    }

    .control-btn {
      background: var(--control-bg);
      color: var(--control-text);
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
    }

    .control-btn:active { transform: scale(0.92); }

    /* Player Indicator */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--control-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 24px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
      margin-top: 50px; 
    }

    .player-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: var(--active-p-color);
      box-shadow: 0 0 12px var(--active-p-color);
      transition: background-color 0.4s, box-shadow 0.4s;
    }

    .player-text {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--control-text);
      transition: color 0.4s;
    }

    /* 3D Wheel Bezel & Wrapper */
    .wheel-bezel {
      position: relative;
      width: 90vw;
      max-width: 380px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      padding: 14px; /* Thickness of the outer metallic rim */
      background: linear-gradient(145deg, var(--bezel-light), var(--bezel-dark));
      box-shadow: 
        0 20px 40px var(--bezel-shadow),
        inset 0 4px 10px rgba(255, 255, 255, 0.3),
        inset 0 -4px 10px rgba(0, 0, 0, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.4s;
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      /* Inner rim shadow creates depth separating canvas from bezel */
      box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 2px 5px rgba(0,0,0,0.5);
    }

    /* Hardware Pointer Wrapper */
    .pointer-container {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      width: 40px;
      height: 55px;
    }

    .pointer {
      width: 100%;
      height: 100%;
      transform-origin: 20px 12px; /* Anchor rotation exactly at the metallic screw */
      transition: transform 0.05s ease;
    }

    @keyframes peg-bounce {
      0% { transform: rotate(0deg); }
      30% { transform: rotate(-25deg); } 
      100% { transform: rotate(0deg); }
    }

    .pointer.tick {
      animation: peg-bounce 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 3D Dome Center Button */
    .center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 22%; 
      height: 22%;
      border-radius: 50%;
      
      /* Glowing inner rim for active player */
      border: 4px solid var(--active-p-color);
      
      /* Dome lighting gradient */
      background: radial-gradient(circle at 35% 35%, var(--btn-grad-top) 0%, var(--btn-grad-bot) 75%, #000 100%);
      
      /* Massive tactile box shadow stacking */
      box-shadow: 
        0 15px 25px var(--btn-shadow), 
        0 8px 10px rgba(0,0,0,0.5),
        inset 0 4px 8px rgba(255,255,255,0.4),
        inset 0 -4px 10px rgba(0,0,0,0.5),
        0 0 20px rgba(var(--active-p-color), 0.5);
        
      color: var(--text-color);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      font-weight: 900;
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.1s, box-shadow 0.1s, border-color 0.4s;
    }

    /* Depressed physical button state */
    .center-btn:active {
      transform: translate(-50%, calc(-50% + 5px));
      box-shadow: 
        0 5px 10px var(--btn-shadow), 
        0 2px 5px rgba(0,0,0,0.5),
        inset 0 2px 5px rgba(255,255,255,0.3),
        inset 0 -2px 5px rgba(0,0,0,0.5),
        0 0 15px rgba(var(--active-p-color), 0.5);
      filter: brightness(0.9);
    }

    .center-btn:disabled {
      border-color: rgba(119, 119, 119, 0.4) !important;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.3) !important;
      color: #777;
      cursor: not-allowed;
      transform: translate(-50%, -50%);
      background: var(--control-bg);
    }

    /* Fullscreen Overlay */
    .fullscreen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--overlay-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, background-color 0.4s ease;
    }

    .fullscreen-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-player {
      font-size: 1.3rem;
      color: var(--overlay-text);
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 15px;
      font-weight: 800;
    }

    .overlay-title {
      font-size: 4rem;
      color: #f59e0b;
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
      font-weight: 900;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .overlay-timer {
      font-size: 10rem;
      font-weight: 900;
      color: var(--overlay-text);
      line-height: 1;
      text-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>

  <div class="top-controls">
    <button class="control-btn" id="themeBtn">🌙 Dark</button>
    <button class="control-btn" id="feedbackBtn">🔕 Mute</button>
    <button class="control-btn" id="fullscreenBtn">⛶ Fullscreen</button>
  </div>

  <div class="status-badge" id="statusBadge">
    <div class="player-dot" id="playerDot"></div>
    <div class="player-text" id="playerText">Player 1</div>
  </div>

  <div class="wheel-bezel">
    <div class="pointer-container">
      <div class="pointer" id="pointer">
        <svg width="40" height="55" viewBox="0 0 40 55" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff7b7b" />
              <stop offset="40%" stop-color="#ef4444" />
              <stop offset="100%" stop-color="#7f1d1d" />
            </linearGradient>
            <linearGradient id="screwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="100%" stop-color="#475569" />
            </linearGradient>
            <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
               <feDropShadow dx="0" dy="5" stdDeviation="3" flood-opacity="0.6"/>
            </filter>
          </defs>
          <g filter="url(#dropShadow)">
            <path d="M 8 5 L 32 5 L 20 48 Z" fill="url(#pinGrad)" stroke="#7f1d1d" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="20" cy="12" r="5" fill="url(#screwGrad)" stroke="#1e293b" stroke-width="1"/>
            <circle cx="20" cy="12" r="2" fill="#0f172a"/>
          </g>
        </svg>
      </div>
    </div>
    <canvas id="wheelCanvas"></canvas>
    <button class="center-btn" id="centerBtn">HOLD</button>
  </div>

  <div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="overlay-player" id="overlayPlayer">Player 1</div>
    <div class="overlay-title" id="overlayTitle">--</div>
    <div class="overlay-timer" id="overlayTimer" style="display: none;">0</div>
  </div>

  <script>
    // --- LocalStorage & Top Controls Logic ---
    const safeStorage = {
      get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
      set: (key, value) => { try { localStorage.setItem(key, value); } catch(e) { } }
    };

    const themeBtn = document.getElementById('themeBtn');
    const feedbackBtn = document.getElementById('feedbackBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    const sysDarkPref = window.matchMedia('(prefers-color-scheme: dark)');
    let currentTheme = safeStorage.get('duel-theme');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        themeBtn.innerText = '☀️ Light';
      } else {
        document.body.removeAttribute('data-theme');
        themeBtn.innerText = '🌙 Dark';
      }
    }

    if (currentTheme) applyTheme(currentTheme);
    else applyTheme(sysDarkPref.matches ? 'dark' : 'light');

    sysDarkPref.addEventListener('change', (e) => {
      if (!safeStorage.get('duel-theme')) applyTheme(e.matches ? 'dark' : 'light');
    });

    themeBtn.addEventListener('click', () => {
      const isDark = document.body.hasAttribute('data-theme');
      currentTheme = isDark ? 'light' : 'dark';
      applyTheme(currentTheme);
      safeStorage.set('duel-theme', currentTheme);
    });

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    });
    
    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.innerText = document.fullscreenElement ? '✖ Exit' : '⛶ Fullscreen';
    });

    let feedbackMode = safeStorage.get('duel-feedback') || 'mute'; 
    let audioCtx;

    function updateFeedbackUI() {
      if (feedbackMode === 'mute') feedbackBtn.innerText = '🔕 Mute';
      else if (feedbackMode === 'haptic') feedbackBtn.innerText = '📳 Vibrate';
      else feedbackBtn.innerText = '🔊 Sound';
    }
    updateFeedbackUI();

    feedbackBtn.addEventListener('click', () => {
      if (feedbackMode === 'mute') feedbackMode = 'haptic';
      else if (feedbackMode === 'haptic') {
        feedbackMode = 'sound';
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } else feedbackMode = 'mute';
      
      safeStorage.set('duel-feedback', feedbackMode);
      updateFeedbackUI();
    });

    // --- Audio Synthesis Engine ---
    function playTickSound() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'triangle';
      const pitch = Math.max(300, 800 * (angularVelocity / MAX_VELOCITY) + 200);
      osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.03);
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.03);
    }

    function playCountdownTick() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = 'square';
      osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
      
      gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.03);
    }

    function playCountdownEnd() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const frequencies = [523.25, 659.25, 783.99, 1046.50];
      frequencies.forEach(freq => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine'; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
      });
    }

    function playEventSound(type) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      if (type === 'bad') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(250, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.8);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
      } else if (type === 'good') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      }

      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 1.0);
    }

    // --- Wheel Game Logic & State ---
    let currentPlayer = 1;
    const segments = [
      "Eat 5s", "Skip Turn", "Eat 20s", "Eat 5s", "Spin Again", "Eat 15s",
      "Eat 5s", "Skip Turn", "Eat 10s", "Spin Again", "Eat 5s", "Eat 15s"
    ];
    
    const colors = [
      "#FF6B6B", "#4ECDC4", "#FFD166", "#6A4C93", "#FF9F1C", "#1982C4",
      "#FF6B6B", "#4ECDC4", "#FFD166", "#6A4C93", "#FF9F1C", "#1982C4"
    ];

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const centerBtn = document.getElementById('centerBtn');
    const pointer = document.getElementById('pointer');
    const playerDot = document.getElementById('playerDot');
    const playerText = document.getElementById('playerText');
    const overlay = document.getElementById('fullscreenOverlay');
    const overlayPlayer = document.getElementById('overlayPlayer');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayTimer = document.getElementById('overlayTimer');

    // Physics Variables
    let currentAngle = 0; 
    let angularVelocity = 0; 
    let isCharging = false;
    let isSpinning = false;
    let animFrame = null;
    let currentFriction = 0.99; 

    const BASE_TAP_VELOCITY = 0.38; 
    const MAX_VELOCITY = 0.65;      
    const CHARGE_RATE = 0.006;      
    const STOP_THRESHOLD = 0.0003; 
    
    const sliceAngle = (2 * Math.PI) / segments.length;
    let lastPassedSegment = 0;

    // --- Advanced 3D Wheel Rendering ---
    function initCanvas() {
      // Calculate size based on bezel width minus padding
      const bezel = document.querySelector('.wheel-bezel');
      const size = bezel.clientWidth - 28; // 14px padding * 2
      const scale = window.devicePixelRatio || 1;
      
      canvas.width = size * scale;
      canvas.height = size * scale;
      
      ctx.scale(scale, scale);
      drawWheel();
      updatePointerSegment(); 
    }

    function drawWheel() {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);
      const cx = w / 2;
      const cy = h / 2;
      const radius = w / 2;

      ctx.clearRect(0, 0, w, h);
      
      // Step 1: Draw Rotating Slices
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(currentAngle);

      for (let i = 0; i < segments.length; i++) {
        const startAngle = i * sliceAngle;
        const endAngle = startAngle + sliceAngle;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = colors[i];
        ctx.fill();
        
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.stroke();
      }
      ctx.restore();

      // Step 2: Global Lighting Overlay (STATIONARY)
      // This applies a highlight to top-left and shadow to bottom-right, making the disc look 3D.
      ctx.save();
      ctx.translate(cx, cy);
      const lighting = ctx.createLinearGradient(-radius, -radius, radius, radius);
      lighting.addColorStop(0, "rgba(255, 255, 255, 0.4)");
      lighting.addColorStop(0.5, "rgba(255, 255, 255, 0)");
      lighting.addColorStop(1, "rgba(0, 0, 0, 0.5)");
      
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, 2 * Math.PI);
      ctx.fillStyle = lighting;
      ctx.fill();
      ctx.restore();

      // Step 3: Draw Text and 3D Pegs (ROTATING OVER THE LIGHTING)
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(currentAngle);

      for (let i = 0; i < segments.length; i++) {
        const startAngle = i * sliceAngle;
        const pegX = radius * 0.94 * Math.cos(startAngle);
        const pegY = radius * 0.94 * Math.sin(startAngle);

        // Draw Text perfectly centered
        ctx.save();
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = "center"; 
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#ffffff";
        ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.font = "800 " + (radius * 0.1) + "px 'Segoe UI', system-ui, sans-serif";
        ctx.fillText(segments[i], radius * 0.61, 0); 
        ctx.restore();
        
        // Draw 3D Metallic Peg
        // 1. Drop shadow for peg
        ctx.beginPath();
        ctx.arc(pegX, pegY, 5, 0, 2 * Math.PI);
        ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fillStyle = "#cbd5e1";
        ctx.fill();
        
        // 2. Clear shadow and draw metallic gradient
        ctx.shadowColor = "transparent";
        ctx.beginPath();
        ctx.arc(pegX, pegY, 5, 0, 2 * Math.PI);
        let pegGrad = ctx.createRadialGradient(pegX - 2, pegY - 2, 0, pegX, pegY, 5);
        pegGrad.addColorStop(0, "#ffffff");
        pegGrad.addColorStop(1, "#475569");
        ctx.fillStyle = pegGrad;
        ctx.fill();
      }
      ctx.restore();
    }

    function updatePointerSegment() {
      let pointerAngle = (3 * Math.PI / 2) - currentAngle;
      pointerAngle = (pointerAngle % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const currentIndex = Math.floor(pointerAngle / sliceAngle);

      if (currentIndex !== lastPassedSegment) {
        lastPassedSegment = currentIndex;
        
        if (isSpinning || isCharging) {
          if (feedbackMode === 'sound') playTickSound();
          else if (feedbackMode === 'haptic' && navigator.vibrate) navigator.vibrate(10);

          pointer.classList.remove('tick');
          void pointer.offsetWidth; 
          pointer.classList.add('tick');

          if (!isCharging) {
            const pegResistance = 0.0015 + (Math.random() * 0.0025); 
            angularVelocity -= pegResistance;
            if (angularVelocity < 0) angularVelocity = 0;
          }
        }
      }
      return currentIndex;
    }

    // --- Unpredictable Physics Engine ---
    function animatePhysics() {
      if (isCharging) {
        angularVelocity = Math.min(angularVelocity + CHARGE_RATE, MAX_VELOCITY);
      } else if (isSpinning) {
        const jitter = (Math.random() * 0.001) - 0.0005;
        angularVelocity *= (currentFriction + jitter);
      } else {
        return; 
      }

      currentAngle += angularVelocity;
      if (currentAngle >= 2 * Math.PI) currentAngle %= (2 * Math.PI);

      drawWheel();
      const winningIndex = updatePointerSegment();

      if (!isCharging && isSpinning && angularVelocity <= STOP_THRESHOLD) {
        isSpinning = false;
        angularVelocity = 0;
        animFrame = null;
        
        if (feedbackMode === 'haptic' && navigator.vibrate) navigator.vibrate([40, 20, 40]);
        
        handleGameplayLogic(segments[winningIndex]);
        return;
      }

      animFrame = requestAnimationFrame(animatePhysics);
    }

    // --- Center Button Controls ---
    function startCharge(e) {
      if (e.cancelable) e.preventDefault();
      if (isSpinning || centerBtn.disabled) return;
      
      if (!audioCtx && feedbackMode === 'sound') {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      
      isCharging = true;
      centerBtn.innerText = "SPIN!";
      angularVelocity = BASE_TAP_VELOCITY; 

      if (!animFrame) animFrame = requestAnimationFrame(animatePhysics);
    }

    function releaseCharge(e) {
      if (!isCharging) return; 
      
      if (e.cancelable) e.preventDefault();
      
      isCharging = false;
      isSpinning = true;
      centerBtn.innerText = "WAIT";
      centerBtn.disabled = true;
      currentFriction = 0.989 + (Math.random() * 0.004); 
    }

    // --- Gameplay Logic ---
    function handleGameplayLogic(result) {
      overlayPlayer.innerText = `Player ${currentPlayer}`;
      overlayTitle.innerText = result;
      overlay.classList.add('show');

      if (result.startsWith("Eat")) {
        const secondsMatch = result.match(/\d+/);
        let seconds = secondsMatch ? parseInt(secondsMatch[0]) : 5;
        
        overlayTimer.style.display = 'block';
        overlayTimer.innerText = seconds;

        const timerInterval = setInterval(() => {
          seconds--;
          overlayTimer.innerText = seconds;
          
          if (seconds > 0) {
            if (feedbackMode === 'sound') playCountdownTick();
            else if (feedbackMode === 'haptic' && navigator.vibrate) navigator.vibrate(15);
          } else {
            clearInterval(timerInterval);
            if (feedbackMode === 'sound') playCountdownEnd();
            else if (feedbackMode === 'haptic' && navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
            
            setTimeout(() => { endTurn(true); }, 1500); 
          }
        }, 1000);
      } else {
        overlayTimer.style.display = 'none';
        
        // Trigger sounds and haptics for events
        if (result === "Skip Turn") {
          if (feedbackMode === 'sound') playEventSound('bad');
          else if (feedbackMode === 'haptic' && navigator.vibrate) navigator.vibrate([200, 100, 400]);
        } else if (result === "Spin Again") {
          if (feedbackMode === 'sound') playEventSound('good');
          else if (feedbackMode === 'haptic' && navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        setTimeout(() => {
          // Switch player unless it's Spin Again (Steal Turn removed)
          endTurn(result !== "Spin Again");
        }, 3000);
      }
    }

    function updateUIColors() {
      const color = currentPlayer === 1 ? 'var(--p1-color)' : 'var(--p2-color)';
      
      document.documentElement.style.setProperty('--active-p-color', color);
      playerText.innerText = `Player ${currentPlayer}`;
    }

    function endTurn(switchPlayer) {
      overlay.classList.remove('show');
      
      if (switchPlayer) {
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateUIColors();
      }

      centerBtn.disabled = false;
      centerBtn.innerText = "HOLD";
    }

    // --- Event Listeners ---
    centerBtn.addEventListener('mousedown', startCharge);
    centerBtn.addEventListener('touchstart', startCharge, { passive: false });
    
    window.addEventListener('mouseup', releaseCharge);
    window.addEventListener('touchend', releaseCharge, { passive: false });
    window.addEventListener('resize', initCanvas);
    
    themeBtn.addEventListener('click', initCanvas);
    sysDarkPref.addEventListener('change', initCanvas);

    // Initial load
    initCanvas();
    updateUIColors(); 
  </script>
</body>
</html>
